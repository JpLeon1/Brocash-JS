<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brocash - Solicitud</title>
    <link rel="stylesheet" href="Style.css"> 
</head>

<body>
    
<header class="header">
    <div class="encabezado">
        <img src="Logos/Logo.png" class="logo"> 
        <h1>Solicitud de Crédito</h1>
    </div>
    <h4>Complete los siguientes campos a continuación:</h4>
</header>

<div class="container">
    <form class="form-card">

        <label>Nombre y apellidos</label>
        <input type="text" placeholder="Nombre y apellidos" required>
        <label>Cédula</label>
        <input type="text" placeholder="Cédula" required>
        <label>Correo electrónico</label>
        <input type="email" placeholder="Email" required>
        <label>Ocupación</label>
        <input type="text" placeholder="Ocupación" required>
        <label>Teléfono</label>
        <input type="tel" placeholder="Teléfono" required>
        <label>Adjuntar desprendible de pago</label>
        <input type="file">
        <label>Adjuntar documento de identidad</label>
        <input type="file">
        <label>Fecha de solicitud</label>
        <input type="date">
        <label class="check">
            <input type="checkbox"> Acepto los términos y condiciones
        </label>

        <button type="submit">Enviar solicitud</button>

    </form>
</div>

</body>
</html>
