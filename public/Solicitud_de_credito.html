<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Brocash - Solicitud</title>
    <link rel="stylesheet" href="Style.css"> 
</head>

<body>
    
<header class="header">
    <div class="encabezado">
        <img src="Logos/Logo.png" class="logo"> 
        <h2>Solicitud de Crédito</h2>
    </div>
    <h4>Complete los siguientes campos a continuación:</h4>
</header>

<div class="container">
    <form class="form-card" action="/Solicitud_de_creditoServlet" method="POST">

        <label>Nombre y apellidos</label> 
        <input type="text" name="Nombre" placeholder="Nombre y apellidos" required>
        
        <label>Cédula</label>
        <input type="number" name="Cedula" placeholder="Cédula" required>
        
        <label>Correo electrónico</label>
        <input type="email" name="email" placeholder="Email" required>
        
        <label>Ocupación</label>
        <input type="text" name="ocupacion" placeholder="Ocupación" required>
        
        <label>Teléfono</label>
        <input type="tel" name="telefono" placeholder="Teléfono" required>
        
        <label for="ingresos_mensuales">Ingresos Mensuales ($):</label>
        <input type="number" name="ingresos_mensuales" id="ingresos_mensuales" placeholder="Ej. 1500000" required>

        <label for="monto_Solicitado">Monto del Crédito Solicitado ($):</label>
        <input type="number" name="monto_Solicitado" id="monto_Solicitado" placeholder="Ej. 3000000" required>

        <label>Adjuntar desprendible de pago</label>
        <input type="file" name="desprendible">
        
        <label>Adjuntar documento de identidad</label>
        <input type="file" name="documento">
        
        <label>Fecha de solicitud</label>
        <input type="date" name="fechaSolicitud">
        
        <label class="check">
            <input type="checkbox" required> Acepto los términos y condiciones
        </label>

        <button type="submit">Enviar solicitud</button>

    </form>
</div>

</body>
</html>
