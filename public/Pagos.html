<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brocash</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <header class="header">
        <div class="encabezado">
            <img src="Logos/Logo.png" class="logo"> 
            <h1>Paga aquí</h1>
            <div class="container">
                <form class="form-card">
                    <p>Ingresa tu información para realizar el pago.</p>
                    <input type="text" name="Cedula" required placeholder="Cedula">
                    <input type="number" name="Credito" required placeholder="Número de crédito">
                    <input type="number" name="Monto" required placeholder="Monto a pagar">                
                    <input type="email" name="email" required placeholder="Email">
                    <div class="bank-options">
                        <label for="banco">Selecciona tu banco:</label>
                        <select id="banco" name="banco" required>
                            <option value="">-- Elige un banco --</option>
                            <option value="banco_bogota">Banco de Bogotá</option>
                            <option value="bancolombia">Bancolombia</option>
                            <option value="davivienda">Davivienda</option>
                            <option value="bbva">BBVA</option>
                            <option value="avvillas">Banco AV Villas</option>
                            <option value="colpatria">Colpatria</option>
                            <option value="Nequi">Nequi</option>
                            <option value="Daviplata">Daviplata</option>
                        </select>
                    </div>
                    <input type="submit" value="Enviar">
                    <div class="links">
                        <a href="Pagina_Principal.html">Pagina Principal</a>
                    </div>
                </form>
            </div>
        </div>
    </header>
</body>
</html>
