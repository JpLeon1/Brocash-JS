<!DOCTYPE html>
<html lang="es"> <head>
    <meta charset="UTF-8">
    <title>Brocash - Registro</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <header class="header">
        <div class="encabezado">
            <img src="Logos/Logo.png" class="logo"> 
            <h1>Registro de usuario</h1>
        </div>
    </header>   
    
    <h3>Complete los siguientes campos:</h3>

    <div class="container">
        <form class="form-card" action="/RegistroServlet" method="POST">
            
            <label for="Nombre">Nombre y apellidos</label>
            <input type="text" id="Nombre" name="Nombre" required placeholder="Nombre y apellidos">
            
            <label for="Cedula">Cédula</label>
            <input type="number" id="Cedula" name="Cedula" required placeholder="Cédula">
            
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" required placeholder="Email">
            
            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono" name="telefono" required placeholder="Teléfono">
            
            <label for="ocupacion">Ocupación</label>
            <input type="text" id="ocupacion" name="ocupacion" required placeholder="Ocupación">

            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required placeholder="Digita tu contraseña">

            <label for="confirmPassword">Confirmar Contraseña</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Repite tu contraseña">

            <button type="submit">Registrarme</button>
            
            <div class="links">
           
                <a href="Pagina_Principal.html">Página Principal</a>
            </div>
        </form>
    </div>
</body>
</html>
